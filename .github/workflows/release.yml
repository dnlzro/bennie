name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        arch: [arm64, x86_64]
    runs-on: macos-latest
    env:
      BENNIE_VERSION: bennie-${{ github.ref_name }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6
      - name: Build binary
        run: swift build -c release --arch ${{ matrix.arch }}
      - name: Prepare binary
        run: |
          BINARY=$(swift build -c release --arch ${{ matrix.arch }} --show-bin-path)/bennie
          strip "$BINARY"
          tar -czf "$BENNIE_VERSION".tar.gz "$BINARY"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} "$BENNIE_VERSION".tar.gz --clobber
